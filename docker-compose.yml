services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - coensio_network

  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    # Eğer .env dosyası kök dizinde yoksa, backend altındaki .env dosyasını kullan
    env_file:
      - ./backend/.env
    depends_on:
      - qdrant
    networks:
      - coensio_network

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - coensio_network

volumes:
  qdrant_data:

networks:
  coensio_network:
    driver: bridge